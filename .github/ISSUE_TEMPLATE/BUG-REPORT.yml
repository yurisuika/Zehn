name: Bug Report
description: Illuminate an outstanding issue in Zehn. For support requests, use Discussions instead.
title: "[Bug]"
labels: [bug]
body:
- type: checkboxes
  attributes:
    label: Before Reporting
    description: "I have checked that the following are true:"
    options:
    - label: There is no existing matching issue or discussion.
      required: true
    - label: My theme is up-to-date.
      required: true
- type: textarea
  attributes:
    label: Describe the Problem
    description: A clear and concise description of what you're experiencing.
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: A clear and concise description of what you expected to happen.
  validations:
    required: true
- type: upload
  attributes:
    label: Upload Screenshots
    description: If applicable, add screenshots to show your problem. These really help!
  validations:
    required: false