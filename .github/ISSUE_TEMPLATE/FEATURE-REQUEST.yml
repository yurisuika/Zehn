name: "Feature Request"
description: "Propose a feature. For support or ideas, use the proper forum in Discussions."
title: "[Feature] "
labels: ["enhancement"]
body:
- type: checkboxes
  id: before_requesting
  attributes:
    label: "Before Requesting"
    description: "Please confirm the following:"
    options:
    - label: "I have searched for existing issues"
      required: true
  validations:
    required: true
- type: textarea
  id: describe_the_feature
  attributes:
    label: "Describe the Feature"
    description: "A clear and detailed description of what the feature is."
    placeholder: "I would like to see..."
  validations:
    required: true
- type: textarea
  id: alternatives_considered
  attributes:
    label: "Alternatives Considered"
    description: "Describe any alternative solutions or features you've considered."
    placeholder: "I also considered..."
  validations:
    required: false
- type: upload
  id: additional_context
  attributes:
    label: "Additional Context"
    description: "Add any other context, mockups, or screenshots about the feature request."
  validations:
    required: false